---
driver:
  name: vagrant

transport:
  max_wait_until_ready: 600
  connection_retries: 10
  connection_retry_sleep: 10

provisioner:
  name: chef_infra
  product_name: chef
  product_version: <%= ENV['CHEF_VERSION'] || 'latest' %>
  channel: stable
  chef_license: accept
  enforce_idempotency: <%= ENV['ENFORCE_IDEMPOTENCY'] || true %>
  multiple_converge: <%= ENV['MULTIPLE_CONVERGE'] || 2 %>
  deprecations_as_errors: true
  policyfile: Policyfile.rb

verifier:
  name: inspec
  sudo: true

platforms:
  - name: almalinux-8
  - name: almalinux-9
  - name: almalinux-10
  - name: centos-stream-9
  - name: centos-stream-10
  - name: fedora-42
  - name: oraclelinux-8
  - name: oraclelinux-9
  - name: rockylinux-8
  - name: rockylinux-9
  - name: rockylinux-10

x-verifiers:
  default: &default_verifier
    inspec_tests:
      - path: test/integration/default
  mysql80: &mysql80_verifier
    inspec_tests:
      - path: test/integration/mysql80
  connectors: &connectors_verifier
    inspec_tests:
      - path: test/integration/connectors
  innovation: &innovation_verifier
    inspec_tests:
      - path: test/integration/innovation

suites:
  - name: default
    provisioner:
      named_run_list: default
    verifier: *default_verifier

  - name: mysql80
    provisioner:
      named_run_list: mysql80
    verifier: *mysql80_verifier
    excludes:
      - almalinux-10
      - centos-stream-10
      - fedora-42
      - rockylinux-10

  - name: connectors
    provisioner:
      named_run_list: connectors
    verifier: *connectors_verifier

  - name: innovation
    provisioner:
      named_run_list: innovation
    verifier: *innovation_verifier
