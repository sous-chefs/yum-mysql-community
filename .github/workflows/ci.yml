---
name: ci

"on":
  pull_request:
  push:
    branches:
      - main

permissions:
  actions: write
  checks: write
  contents: read
  issues: write
  pull-requests: write
  statuses: write

jobs:
  lint-unit:
    uses: sous-chefs/.github/.github/workflows/lint-unit.yml@8.0.1
    permissions:
      actions: write
      checks: write
      contents: read
      pull-requests: write
      statuses: write
      issues: write

  integration:
    needs: lint-unit
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        suite:
          - default
          - mysql80
          - connectors
          - innovation
        os:
          - almalinux-8
          - almalinux-9
          - almalinux-10
          - centos-stream-9
          - centos-stream-10
          - fedora-42
          - oraclelinux-8
          - oraclelinux-9
          - rockylinux-8
          - rockylinux-9
          - rockylinux-10
        exclude:
          - suite: mysql80
            os: almalinux-10
          - suite: mysql80
            os: centos-stream-10
          - suite: mysql80
            os: rockylinux-10
          - suite: mysql80
            os: fedora-42

    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Install Cinc Workstation
        uses: sous-chefs/.github/.github/actions/install-workstation@6.0.0

      - name: Test Kitchen
        env:
          CHEF_LICENSE: accept-no-persist
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        run: chef exec kitchen test "${{ matrix.suite }}-${{ matrix.os }}" --destroy=always

      - name: Print debug output on failure
        if: failure()
        env:
          KITCHEN_LOCAL_YAML: kitchen.dokken.yml
        run: |
          sudo journalctl -l --since today
          chef exec kitchen exec "${{ matrix.suite }}-${{ matrix.os }}" -c "journalctl -l" || true
